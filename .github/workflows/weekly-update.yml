name: Weekly Container Update

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update on GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: cd ~/zyn-empire-runtime && ./zyn-update.sh
      - name: Notify
        run: |
          curl -sf -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "ZYN Weekly update complete."}' || true
